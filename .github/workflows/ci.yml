name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so composite-project references resolve. Several
      # workspace tsconfigs reference others' `dist/` (e.g. pdf →
      # calc-engine), which doesn't exist on a fresh checkout. Local
      # dev never hits this because the dist folders persist; CI does.
      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Format check (root only)
        run: pnpm format:check

  docker-build-api:
    name: docker build (api)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: vibecalc-api:ci
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=ci-${{ github.run_number }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  docker-build-web:
    name: docker build (web)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: vibecalc-web:ci
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=ci-${{ github.run_number }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
